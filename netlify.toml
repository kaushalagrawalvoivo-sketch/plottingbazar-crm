[build]
  command = "git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $HOME/flutter && export PATH=$HOME/flutter/bin:$PATH && flutter config --enable-web && flutter pub get && flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_WEB_RENDERER = "canvaskit"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
